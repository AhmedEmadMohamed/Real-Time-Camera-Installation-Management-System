<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Details</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .edit-status-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        .status-select {
            padding: 5px;
            border-radius: 5px;
            border: 1px solid var(--border);
            display: none; 
        }
    </style>
</head>
<body style="display: block; padding: 40px;">
    <div class="container" style="max-width: 800px; margin: auto;">
        <button onclick="window.location.href='index.html'" class="btn-secondary" style="margin-bottom: 20px;">← Back to Dashboard</button>
        
        <div id="job-details-card" class="table-container" style="padding: 30px; background: white;">
            <div style="display: flex; justify-content: space-between; align-items: start;">
                <h2 id="det-title" style="margin-top: 0; color: var(--primary);">Loading...</h2>
                <div id="det-id" style="font-weight: bold; color: var(--text-muted);"></div>
            </div>
            
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="font-weight: 600; color: var(--text-muted);">Customer Name</label>
                    <p id="det-customer" style="font-size: 1.1rem; margin: 5px 0 20px;"></p>
                </div>
                <div>
                    <label style="font-weight: 600; color: var(--text-muted);">Current Status</label>
                    <div class="edit-status-container">
                        <span id="det-status"></span>
                        <button id="btn-edit-status" class="btn-secondary" style="padding: 2px 8px; font-size: 0.7rem;">Edit</button>
                        
                        <select id="status-dropdown" class="status-select">
                            <option value="Pending">Pending</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                            <option value="In Progress">In Progress</option>
                        </select>
                        <button id="btn-save-status" class="btn-primary" style="display:none; padding: 2px 8px; font-size: 0.7rem;">Save</button>
                    </div>
                </div>
                <div>
                    <label style="font-weight: 600; color: var(--text-muted);">Scheduled Date</label>
                    <p id="det-date" style="margin: 5px 0 20px;"></p>
                </div>
            </div>

            <div style="margin-top: 20px;">
                <label style="font-weight: 600; color: var(--text-muted);">Description</label>
                <p id="det-desc" style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border); line-height: 1.6;"></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://localhost:7267/api";
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');

        async function fetchJobDetails() {
            if (!jobId) return;
            try {
                const response = await fetch(`${API_BASE_URL}/jobs/${jobId}`);
                const job = await response.json();

                if (response.ok) {
                    document.getElementById("det-title").textContent = job.jobTitle;
                    document.getElementById("det-customer").textContent = job.customerName;
                    document.getElementById("det-id").textContent = `#${job.jobId}`;
                    document.getElementById("det-desc").textContent = job.jobDescription || "No description.";
                    document.getElementById("det-date").textContent = new Date(job.scheduledDate).toLocaleString();
                    
                    updateStatusUI(job.jobStatus);
                }
            } catch (err) { console.error(err); }
        }

        function updateStatusUI(status) {
            const statusSpan = document.getElementById("det-status");
            statusSpan.textContent = status;
            statusSpan.className = `status-badge ${status.toLowerCase()}`;
        }

        document.getElementById("btn-edit-status").onclick = function() {
            this.style.display = "none";
            document.getElementById("status-dropdown").style.display = "inline-block";
            document.getElementById("btn-save-status").style.display = "inline-block";
            document.getElementById("det-status").style.display = "none";
        };

  
        document.getElementById("btn-save-status").onclick = async function() {
            const newStatus = document.getElementById("status-dropdown").value;
            
            try {
                const response = await fetch(`${API_BASE_URL}/jobs/${jobId}/status`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ jobStatus: newStatus }) 
                });

                if (response.ok) {
               
                    document.getElementById("btn-edit-status").style.display = "inline-block";
                    document.getElementById("status-dropdown").style.display = "none";
                    document.getElementById("btn-save-status").style.display = "none";
                    document.getElementById("det-status").style.display = "inline-block";
                    
                    updateStatusUI(newStatus);
                    alert("Status updated successfully!");
                } else {
                    alert("Failed to update status.");
                }
            } catch (err) { console.error(err); }
        };

        fetchJobDetails();
    </script>
</body>
</html>
